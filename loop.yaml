name: Agent Loop

on:
  schedule:
    - cron: '*/30 * * * *'   # roda a cada 30 minutos
  workflow_dispatch:           # permite rodar manualmente pelo GitHub

permissions:
  contents: write

jobs:
  run-loop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run agent loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python loop.py

      - name: Commit and push if changed
        run: |
          git config user.name "loop-agent[bot]"
          git config user.email "loop-agent@users.noreply.github.com"
          git add index.html state.json
          git diff --staged --quiet || git commit -m "loop: iteração $(cat state.json | python3 -c "import sys,json; print(json.load(sys.stdin)['iteration'])")"
          git push
